<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1623">
<title>投資組合</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0f1623}
:root{
  --bg:#0f1623;--bg2:#1a2236;--bg3:#232f45;--bg4:#2a3850;
  --text:#e8edf5;--text2:#8a9ab5;--text3:#5a6a85;
  --blue:#3b82f6;--red:#f87171;--orange:#fb923c;
  --green:#34d399;--yellow:#fbbf24;--purple:#a78bfa;
  --border:#2a3850;--r:14px;--font:'Noto Sans TC',sans-serif;
}
body{color:var(--text);font-family:var(--font);font-size:14px}
.app{display:flex;flex-direction:column;max-width:430px;margin:0 auto;height:100vh;overflow:hidden}

/* HEADER */
.hdr{background:var(--bg2);padding:14px 14px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.pnl-area{flex:1;min-width:0}
.pnl-lbl{font-size:10px;color:var(--text2)}
.pnl-val{font-size:20px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.pnl-pct{font-size:12px;margin-top:1px}
.risk-badge{background:#3b1c1c;color:#f87171;border:1px solid #7f1d1d;font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.sm{background:var(--bg3);border-radius:7px;padding:6px 8px;text-align:center}
.sm-lbl{font-size:9px;color:var(--text2);margin-bottom:1px}
.sm-val{font-size:11px;font-weight:700;line-height:1.3}
.alert-bar{display:flex;gap:5px;overflow-x:auto;margin-bottom:8px;scrollbar-width:none}
.alert-bar::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:4px 9px;border-radius:20px;font-size:10px;display:flex;align-items:center;gap:3px;flex-shrink:0}
.pill.warn{background:#3a2800;color:#fbbf24;border:1px solid #5a3f00}
.pill.danger{background:#3b1c1c;color:#f87171;border:1px solid #7f1d1d}

/* TABS */
.tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 12px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;position:relative;user-select:none}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.tab .bdg{position:absolute;top:5px;right:1px;background:#ef4444;color:#fff;font-size:9px;width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* CONTENT */
.content{flex:1;padding:12px;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:10px}
.panel{display:none;flex-direction:column;gap:10px}
.panel.active{display:flex}

/* CARDS */
.card{background:var(--bg2);border-radius:var(--r);padding:13px;border:1px solid var(--border)}
.card-title{font-size:13px;font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:5px}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.sbox{background:var(--bg3);border-radius:9px;padding:9px 10px}
.sbox label{font-size:9px;color:var(--text2);display:block;margin-bottom:3px}
.sbox .v{font-size:13px;font-weight:700;line-height:1.2}
.v.r{color:var(--red)}.v.o{color:var(--orange)}.v.g{color:var(--green)}.v.y{color:var(--yellow)}

/* BUTTONS */
.add-btn{border:none;border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s;font-family:var(--font)}
.add-btn:active{opacity:.8;transform:scale(.98)}
.btn-blue{background:#1e40af;color:#fff}
.btn-green{background:#065f46;color:#fff}
.btn-outline{background:var(--bg3);color:#60a5fa;border:1px solid #2a3d60}

/* TIME BTNS */
.tbtns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.tbtn{padding:5px 10px;border-radius:20px;font-size:11px;background:var(--bg3);color:var(--text2);border:none;cursor:pointer;transition:.15s;font-family:var(--font)}
.tbtn.active{background:var(--blue);color:#fff;font-weight:700}

/* CHART */
.ch-wrap{position:relative;width:100%;height:190px}
.ch-leg{display:flex;gap:14px;justify-content:center;margin-top:7px;font-size:10px;color:var(--text2)}
.ch-leg span{display:flex;align-items:center;gap:4px}
.dot{width:12px;height:3px;border-radius:2px;display:inline-block}
.dot-d{width:12px;height:0;border-top:2px dashed;display:inline-block}

/* LIST ITEMS */
.list-item{background:var(--bg3);border-radius:10px;padding:12px 13px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;transition:.15s;gap:8px}
.list-item:active{opacity:.7}
.li-left .name{font-size:14px;font-weight:700}
.li-left .sub{font-size:10px;color:var(--text2);margin-top:2px}
.li-left .sub2{font-size:10px;color:var(--text3);margin-top:3px}
.li-right{text-align:right;flex-shrink:0}
.li-right .amt{font-size:14px;font-weight:800}
.li-right .rate{font-size:10px;color:var(--text2);margin-top:2px}
.li-right .tag{font-size:10px;color:#60a5fa;margin-top:2px}
.li-right .pct{font-size:14px;font-weight:800}

.stock-nums{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
.snum{font-size:11px;color:var(--text2)}
.snum b{color:var(--text);font-weight:600}

.code-tag{background:var(--bg4);font-size:10px;color:var(--text2);padding:2px 6px;border-radius:4px;margin-top:3px;display:inline-block}

/* RISK */
.ralert{border-radius:9px;padding:11px 13px;margin-bottom:5px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500}
.ralert.y{background:#3a2800;color:#fbbf24;border:1px solid #5a3f00}
.ralert.r{background:#3b1c1c;color:#f87171;border:1px solid #7f1d1d}
.ri{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ri.y{background:#fbbf24}.ri.r{background:#f87171}

.prog-card{background:var(--bg3);border-radius:9px;padding:13px}
.prog-lbl{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.prog-track{height:9px;border-radius:5px;background:var(--bg4);overflow:hidden}
.prog-fill{height:100%;border-radius:5px}
.prog-marks{display:flex;justify-content:space-between;margin-top:5px;font-size:9px;color:var(--text3)}

.mcard{background:#0a2f1a;border-radius:9px;padding:13px;border:1px solid #134d2a}
.mcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.mcard-top .ml{font-size:13px;font-weight:700;color:#a7f3d0}
.mcard-top .mv{font-size:26px;font-weight:800;color:var(--green)}
.mbar{position:relative;height:13px;border-radius:7px;background:rgba(0,0,0,.3);margin-bottom:7px;overflow:visible}
.mfill{height:100%;border-radius:7px;background:var(--green)}
.mmk{position:absolute;top:-2px;width:2px;height:17px;border-radius:1px}
.mmk.r{background:#f87171}.mmk.y{background:#fbbf24}
.msubs{display:flex;justify-content:space-between;font-size:9px;color:#6ee7b7;margin-bottom:9px}
.mstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:9px}
.mstat .msl{font-size:9px;color:#6ee7b7;margin-bottom:2px;text-align:center}
.mstat .msv{font-size:12px;font-weight:700;color:#a7f3d0;text-align:center}
.mok{font-size:11px;color:var(--green);display:flex;align-items:center;gap:3px;justify-content:center}

.ditem{background:var(--bg3);border-radius:9px;padding:11px}
.ditem-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.ditem-top .dn{font-size:13px;font-weight:700}
.ditem-top .dr{font-size:14px;font-weight:800;color:var(--green)}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px 8px}
.dgrid .dl{font-size:10px;color:var(--text2)}
.dgrid .dv{font-size:10px;color:var(--text);font-weight:600;text-align:right}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:14px;padding:4px 0}
.donut-leg{flex:1}
.dleg-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid var(--bg4)}
.dleg-item:last-child{border:none}
.dleg-l{display:flex;align-items:center;gap:6px}
.ldot{width:9px;height:9px;border-radius:50%}

/* CASH */
.cash-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border-radius:9px;padding:12px 13px}
.upd-btn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:#60a5fa;font-size:11px;padding:5px 11px;cursor:pointer;font-family:var(--font)}

/* STATUS TAGS */
.stag{display:inline-block;padding:2px 7px;border-radius:9px;font-size:9px;font-weight:700}
.stag.paid{background:#064e3b;color:#34d399}
.stag.pend{background:#3f1f00;color:#fb923c}

/* SYNC BTNS */
.sync-btns{display:flex;gap:7px}
.sbtn{flex:1;padding:10px 7px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;border:none;font-family:var(--font)}
.sbtn.blue{background:#1e3a5f;color:#60a5fa}
.sbtn.purple{background:#2e1f5e;color:#a78bfa}

/* MODAL */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:18px 18px 40px;border-top:1px solid var(--border);transform:translateY(100%);transition:.25s;max-height:90vh;overflow-y:auto}
.overlay.open .sheet{transform:translateY(0)}
.handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px}
.fg{margin-bottom:12px}
.fg label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px}
.fg input,.fg select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;-webkit-appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--blue)}
.fg select option{background:var(--bg3)}
.mbtns{display:flex;gap:7px;margin-top:16px}
.mbtn{flex:1;padding:12px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.15s;font-family:var(--font)}
.mbtn:active{opacity:.8;transform:scale(.98)}
.mbtn.cancel{background:var(--bg3);color:var(--text2)}
.mbtn.confirm{background:var(--blue);color:#fff}
.mbtn.del{background:#7f1d1d;color:#f87171}
.sect-lbl{font-size:11px;color:var(--text2);font-weight:700;padding:0 3px}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="avatar">📊</div>
      <div class="pnl-area">
        <div class="pnl-lbl">累積損益</div>
        <div class="pnl-val r" id="hPnl">+0</div>
        <div class="pnl-pct r" id="hPct">+0.00%</div>
      </div>
      <div style="text-align:right">
        <div class="risk-badge" onclick="switchTab('risk')">● 風險</div>
        <div style="font-size:9px;color:var(--text2);margin-top:4px">庫存市值</div>
        <div style="font-size:12px;font-weight:700" id="hMkt">0</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="sm"><div class="sm-lbl">總資產</div><div class="sm-val" id="hAsset">0</div></div>
      <div class="sm"><div class="sm-lbl">總負債</div><div class="sm-val r" id="hDebt">0<br><span style="font-size:8px;color:var(--text2);font-weight:400" id="hDebtPct">負債率 0%</span></div></div>
      <div class="sm"><div class="sm-lbl">淨資產</div><div class="sm-val" id="hNet">0</div></div>
    </div>
    <div class="alert-bar" id="alertBar"></div>
    <div class="tabs" id="tabs">
      <div class="tab active" onclick="switchTab('holdings')">持股</div>
      <div class="tab" onclick="switchTab('debt')">負債</div>
      <div class="tab" onclick="switchTab('dividend')">股利</div>
      <div class="tab" onclick="switchTab('realized')">已實現</div>
      <div class="tab" onclick="switchTab('cash')">現金</div>
      <div class="tab" onclick="switchTab('risk')">風險<span class="bdg" id="riskBdg">0</span></div>
      <div class="tab" onclick="switchTab('overview')">總覽</div>
    </div>
  </div>

  <div class="content">

    <!-- 持股 -->
    <div class="panel active" id="panel-holdings">
      <button class="add-btn btn-blue" onclick="openModal('add-stock')">＋ 新增持股</button>
      <div class="sect-lbl">持股明細</div>
      <div id="stockList"></div>
    </div>

    <!-- 負債 -->
    <div class="panel" id="panel-debt">
      <div class="g2" id="debtSummary"></div>
      <div class="sect-lbl">負債明細</div>
      <div id="debtList"></div>
      <button class="add-btn btn-outline" onclick="openModal('add-debt')">＋ 新增負債</button>
    </div>

    <!-- 股利 -->
    <div class="panel" id="panel-dividend">
      <div class="g2" id="divSummary"></div>
      <div class="sync-btns">
        <button class="sbtn blue">🔄 同步除息預告</button>
        <button class="sbtn purple">🔄 同步＋自動補上</button>
      </div>
      <div style="font-size:10px;color:var(--text2);text-align:right">上次同步：手動</div>
      <div style="background:var(--bg3);border-radius:9px;padding:11px;font-size:11px;color:var(--text2);line-height:1.6">📅 除權息行事曆：暫無未來除權息日</div>
      <div class="sect-lbl">股利明細</div>
      <div id="divList"></div>
      <button class="add-btn btn-green" onclick="openModal('add-div')">＋ 新增股利</button>
    </div>

    <!-- 已實現 -->
    <div class="panel" id="panel-realized">
      <div class="g2" id="realSummary"></div>
      <div id="realList"></div>
      <button class="add-btn btn-outline" onclick="openModal('add-realized')">＋ 新增已實現</button>
    </div>

    <!-- 現金 -->
    <div class="panel" id="panel-cash">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:12px;color:var(--text2)">即時報價</div>
        <button class="upd-btn">🔄 更新報價</button>
      </div>
      <div class="cash-row">
        <div style="color:var(--text2);font-size:13px">💵 現金餘額</div>
        <div style="display:flex;align-items:baseline;gap:4px;cursor:pointer" onclick="openModal('edit-cash')">
          <span style="font-size:16px;font-weight:800" id="cashDisplay">0</span>
          <span style="font-size:11px;color:var(--text2)">元</span>
        </div>
      </div>
      <div class="card">
        <div class="card-title">🥧 持股比例</div>
        <div class="donut-wrap">
          <canvas id="donutChart" width="120" height="120" role="img" aria-label="持股比例"></canvas>
          <div class="donut-leg" id="donutLeg"></div>
        </div>
      </div>
    </div>

    <!-- 風險 -->
    <div class="panel" id="panel-risk">
      <div id="riskAlerts"></div>
      <div class="prog-card">
        <div class="prog-lbl">
          <span style="font-size:13px;font-weight:700">負債比率</span>
          <span style="font-size:16px;font-weight:800;color:var(--yellow)" id="debtRatioVal">0%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="debtRatioBar" style="background:var(--yellow)"></div></div>
        <div class="prog-marks"><span style="color:var(--green)">安全 &lt;30%</span><span style="color:var(--yellow)">警戒 30-50%</span><span style="color:var(--red)">危險 &gt;50%</span></div>
      </div>
      <div class="card">
        <div class="card-title">📌 整戶質押維持率</div>
        <div class="mcard" id="maintainCard">
          <div class="mcard-top"><span class="ml">整戶維持率</span><span class="mv" id="maintainVal">—</span></div>
          <div class="mbar"><div class="mfill" id="maintainFill" style="width:0%"></div><div class="mmk r" style="left:31%"></div><div class="mmk y" style="left:40%"></div></div>
          <div class="msubs"><span>追繳線 100%</span><span>警戒線 130%</span></div>
          <div class="mstats">
            <div class="mstat"><div class="msl">質押總市值</div><div class="msv" id="pledgeMV">—</div></div>
            <div class="mstat"><div class="msl">質押總貸款</div><div class="msv" id="pledgeLoan">—</div></div>
            <div class="mstat"><div class="msl">安全墊</div><div class="msv" id="pledgeSafe">—</div></div>
          </div>
          <div class="mok" id="maintainMsg">— 請輸入質押資料</div>
        </div>
      </div>
      <div id="pledgeDetails"></div>
    </div>

    <!-- 總覽 -->
    <div class="panel" id="panel-overview">
      <div class="card">
        <div class="card-title">淨資產走勢</div>
        <div class="ch-wrap"><canvas id="trendChart" role="img" aria-label="淨資產走勢">淨資產走勢</canvas></div>
        <div class="ch-leg">
          <span><span class="dot" style="background:#34d399"></span>淨資產</span>
          <span><span class="dot-d" style="border-color:#60a5fa"></span>總資產</span>
        </div>
      </div>
      <div class="card">
        <div class="card-title">資產配置</div>
        <div id="ovStats"></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet" id="sheet">
    <div class="handle"></div>
    <div class="modal-title" id="modalTitle">編輯</div>
    <div id="modalBody"></div>
    <div class="mbtns" id="modalBtns"></div>
  </div>
</div>

<script>
// ===================== DATA STORE =====================
const KEYS={stocks:'pf_stocks',debts:'pf_debts',divs:'pf_divs',realized:'pf_realized',cash:'pf_cash'};

function load(k){try{return JSON.parse(localStorage.getItem(k))||[]}catch{return[]}}
function loadVal(k,def=0){try{return parseFloat(localStorage.getItem(k))||def}catch{return def}}
function save(k,v){localStorage.setItem(k,typeof v==='object'?JSON.stringify(v):v)}

let stocks=load(KEYS.stocks);
let debts=load(KEYS.debts);
let divs=load(KEYS.divs);
let realized=load(KEYS.realized);
let cash=loadVal(KEYS.cash,0);

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ===================== HELPERS =====================
function fmt(n){if(n===undefined||n===null||isNaN(n))return'—';return Math.round(n).toLocaleString('zh-TW')}
function fmtF(n,d=2){if(isNaN(n))return'—';return n.toFixed(d)}
function pctColor(v){return v>=0?'g':'r'}
function sign(v){return v>=0?'+':''}

// ===================== CALC SUMMARY =====================
function calcSummary(){
  const totalMkt=stocks.reduce((s,x)=>{
    const mv=x.shares*(x.price||x.avgPrice||0);
    return s+mv;
  },0);
  const totalDebt=debts.reduce((s,x)=>s+(x.amount||0),0);
  const totalAsset=totalMkt+cash;
  const netAsset=totalAsset-totalDebt;
  const totalCost=stocks.reduce((s,x)=>s+(x.shares||0)*(x.avgPrice||0),0);
  const pnl=totalMkt-totalCost;
  const pnlPct=totalCost>0?pnl/totalCost*100:0;
  const debtRatio=totalAsset>0?totalDebt/totalAsset*100:0;

  const annInt=debts.reduce((s,x)=>s+(x.amount||0)*(x.rate||0)/100,0);
  const annDiv=divs.reduce((s,x)=>s+(x.shares||0)*(x.perShare||0),0);
  const covRatio=annInt>0?annDiv/annInt:0;
  const monthNetFlow=annDiv/12-annInt/12;

  return{totalMkt,totalDebt,totalAsset,netAsset,totalCost,pnl,pnlPct,debtRatio,annInt,annDiv,covRatio,monthNetFlow};
}

  if(s.debtRatio>50) alerts.push({cls:'danger',txt:'🔴 負債比率 '+fmtF(s.debtRatio,1)+'%，危險'});
  else if(s.debtRatio>30) alerts.push({cls:'warn',txt:'🟡 負債比率 '+fmtF(s.debtRatio,1)+'%，槓桿略高'});
  // concentration

// ===================== RENDER RISK =====================
function renderRisk(){
  const s=calcSummary();
  const alerts=[];
  if(s.debtRatio>50) alerts.push({c:'r',t:'負債比率 '+fmtF(s.debtRatio,1)+'%，已達危險區間'});
  else if(s.debtRatio>30) alerts.push({c:'y',t:'負債比率 '+fmtF(s.debtRatio,1)+'%，槓桿略高'});
  stocks.forEach(x=>{
    const mkt=x.shares*(x.price||x.avgPrice||0);
    const pct=s.totalMkt>0?mkt/s.totalMkt*100:0;
    if(pct>60) alerts.push({c:'r',t:x.name+' 佔 '+fmtF(pct,1)+'%，集中度過高'});
  });
  if(s.covRatio<1&&s.annDiv>0) alerts.push({c:'y',t:'股利覆蓋率不足，利息 ＞ 股利'});
  document.getElementById('riskAlerts').innerHTML=alerts.length
    ?alerts.map(a=>`<div class="ralert ${a.c}"><span class="ri ${a.c}"></span>${a.t}</div>`).join('')
    :'<div class="ralert y"><span class="ri y"></span>目前無風險警示</div>';

  const ratio=s.debtRatio;
  document.getElementById('debtRatioVal').textContent=fmtF(ratio,1)+'%';
  const bar=document.getElementById('debtRatioBar');
  bar.style.width=Math.min(ratio,100)+'%';
  bar.style.background=ratio>50?'var(--red)':ratio>30?'var(--yellow)':'var(--green)';

  // pledge
  const pledgeDebts=debts.filter(x=>x.collateral);
  const pledgeStocks=pledgeDebts.map(x=>({...x,stock:stocks.find(s=>s.code===x.collateral)}));
  const pledgeMV=pledgeStocks.reduce((s,x)=>s+(x.stock?x.stock.shares*(x.stock.price||x.stock.avgPrice||0):0),0);
  const pledgeLoan=pledgeDebts.reduce((s,x)=>s+(x.amount||0),0);
  const maintainRate=pledgeLoan>0?pledgeMV/pledgeLoan*100:0;
  const safe=pledgeLoan>0?(pledgeMV-pledgeLoan*1.3):0;

  document.getElementById('pledgeMV').textContent=pledgeMV?fmt(pledgeMV):'—';
  document.getElementById('pledgeLoan').textContent=pledgeLoan?fmt(pledgeLoan):'—';
  document.getElementById('pledgeSafe').textContent=pledgeLoan?fmt(safe):'—';
  document.getElementById('maintainVal').textContent=pledgeLoan?fmtF(maintainRate,1)+'%':'—';
  const fill=document.getElementById('maintainFill');
  fill.style.width=pledgeLoan?Math.min(maintainRate/3,100)+'%':'0%';
  fill.style.background=maintainRate<100?'var(--red)':maintainRate<130?'var(--yellow)':'var(--green)';
  const gap=maintainRate-130;
  document.getElementById('maintainMsg').textContent=pledgeLoan
    ?(maintainRate>=130?'✓ 健康，距離警戒線還有 '+fmtF(gap,1)+'%':'⚠ 已低於警戒線！')
    :'— 請輸入質押資料';

  document.getElementById('pledgeDetails').innerHTML=pledgeDebts.length?`
    <div class="sect-lbl">各筆質押明細</div>`+pledgeDebts.map(x=>{
      const st=stocks.find(s=>s.code===x.collateral);
      const mv=st?st.shares*(st.price||st.avgPrice||0):0;
      const mr=x.amount>0?mv/x.amount*100:0;
      return`<div class="ditem" style="margin-bottom:7px">
        <div class="ditem-top"><span class="dn">${x.bank}</span><span class="dr">${fmtF(mr,1)}%</span></div>
        <div class="dgrid">
          <span class="dl">質押標的</span><span class="dv">${x.collateral}</span>
          <span class="dl">貸款餘額</span><span class="dv">${fmt(x.amount)} 元</span>
          <span class="dl">質押市值</span><span class="dv">${fmt(mv)} 元</span>
          <span class="dl">維持率</span><span class="dv">${fmtF(mr,1)}%</span>
        </div>
      </div>`}).join(''):'';
}

// ===================== MODAL SYSTEM =====================
let currentModal=null;
let currentId=null;

function openModal(type, id){
  currentModal=type; currentId=id||null;
  const overlay=document.getElementById('overlay');
  const title=document.getElementById('modalTitle');
  const body=document.getElementById('modalBody');
  const btns=document.getElementById('modalBtns');

  let html='', titleText='', showDel=false;

  if(type==='add-stock'||type==='edit-stock'){
    const x=id?stocks.find(s=>s.id===id):{};
    titleText=id?'編輯持股':'新增持股';
    showDel=!!id;
    html=fields([
      {l:'股票代號',k:'code',v:x.code||'',p:'例：0050'},
      {l:'股票名稱',k:'name',v:x.name||'',p:'例：元大台灣50'},
      {l:'持有股數',k:'shares',v:x.shares||'',p:'例：1000',t:'number'},
      {l:'買入均價',k:'avgPrice',v:x.avgPrice||'',p:'例：77.48',t:'number'},
      {l:'現價（選填）',k:'price',v:x.price||'',p:'例：95.90',t:'number'},
      {l:'首次買入日期',k:'date',v:x.date||'',t:'date'},
    ]);
  } else if(type==='add-debt'||type==='edit-debt'){
    const x=id?debts.find(d=>d.id===id):{};
    titleText=id?'編輯負債':'新增負債';
    showDel=!!id;
    html=fields([
      {l:'機構名稱',k:'bank',v:x.bank||'',p:'例：元大質押'},
      {l:'貸款類型',k:'type',v:x.type||'',p:'例：股票質押貸款'},
      {l:'貸款金額',k:'amount',v:x.amount||'',p:'例：1000000',t:'number'},
      {l:'年利率 (%)',k:'rate',v:x.rate||'',p:'例：2.85',t:'number'},
      {l:'月還款金額（含本金，選填）',k:'monthlyPayment',v:x.monthlyPayment||'',p:'例：24083',t:'number'},
      {l:'質押標的股票代號（選填）',k:'collateral',v:x.collateral||'',p:'例：0050'},
    ]);
  } else if(type==='add-div'||type==='edit-div'){
    const x=id?divs.find(d=>d.id===id):{};
    titleText=id?'編輯股利':'新增股利';
    showDel=!!id;
    html=fields([
      {l:'股票代號',k:'code',v:x.code||'',p:'例：0050'},
      {l:'股票名稱',k:'name',v:x.name||'',p:'例：元大台灣50'},
      {l:'持有股數',k:'shares',v:x.shares||'',p:'例：12706',t:'number'},
      {l:'每股股利',k:'perShare',v:x.perShare||'',p:'例：0.78',t:'number'},
      {l:'發放/預計日期',k:'date',v:x.date||'',t:'date'},
      {l:'狀態',k:'status',v:x.status||'pending',sel:[{v:'paid',l:'已發放'},{v:'pending',l:'未到期'}]},
    ]);
  } else if(type==='add-realized'||type==='edit-realized'){
    const x=id?realized.find(r=>r.id===id):{};
    titleText=id?'編輯已實現':'新增已實現';
    showDel=!!id;
    html=fields([
      {l:'股票代號',k:'code',v:x.code||'',p:'例：0050'},
      {l:'股票名稱',k:'name',v:x.name||'',p:'例：元大台灣50'},
      {l:'賣出股數',k:'shares',v:x.shares||'',p:'',t:'number'},
      {l:'賣出均價',k:'sellPrice',v:x.sellPrice||'',p:'',t:'number'},
      {l:'買入均價',k:'buyPrice',v:x.buyPrice||'',p:'',t:'number'},
      {l:'賣出日期',k:'date',v:x.date||'',t:'date'},
    ]);
  } else if(type==='edit-cash'){
    titleText='編輯現金餘額';
    html=fields([{l:'現金餘額（元）',k:'cash',v:cash||'',p:'',t:'number'}]);
  }

  title.textContent=titleText;
  body.innerHTML=html;
  btns.innerHTML=`
    <button class="mbtn cancel" onclick="closeModal()">取消</button>
    ${showDel?`<button class="mbtn del" onclick="deleteItem()">刪除</button>`:''}

function fields(arr){
  return arr.map(f=>{
    if(f.sel){
      return`<div class="fg"><label>${f.l}</label><select data-key="${f.k}">${f.sel.map(o=>`<option value="${o.v}"${f.v===o.v?' selected':''}>${o.l}</option>`).join('')}</select></div>`;
    }
    return`<div class="fg"><label>${f.l}</label><input type="${f.t||'text'}" data-key="${f.k}" value="${f.v!==undefined?f.v:''}" placeholder="${f.p||''}"></div>`;
  }).join('');
}

function getFormData(){
  const data={};
  document.querySelectorAll('#modalBody [data-key]').forEach(el=>{
    const v=el.value.trim();
    const k=el.dataset.key;
    data[k]=el.type==='number'||(el.tagName==='INPUT'&&(k==='shares'||k==='avgPrice'||k==='price'||k==='amount'||k==='rate'||k==='perShare'||k==='sellPrice'||k==='buyPrice'||k==='cash'||k==='monthlyPayment'))?parseFloat(v)||0:v;
  });
  return data;
}

function saveModal(){
  const d=getFormData();
  if(currentModal==='add-stock'||currentModal==='edit-stock'){
    if(!d.code||!d.shares||!d.avgPrice){alert('請填寫代號、股數、均價');return}
    if(currentId){const i=stocks.findIndex(x=>x.id===currentId);stocks[i]={...stocks[i],...d};}
    else stocks.push({id:uid(),...d});
    save(KEYS.stocks,stocks);
  } else if(currentModal==='add-debt'||currentModal==='edit-debt'){
    if(!d.bank||!d.amount){alert('請填寫機構和金額');return}
    if(currentId){const i=debts.findIndex(x=>x.id===currentId);debts[i]={...debts[i],...d};}
    else debts.push({id:uid(),...d});
    save(KEYS.debts,debts);
  } else if(currentModal==='add-div'||currentModal==='edit-div'){
    if(!d.code||!d.shares||!d.perShare){alert('請填寫代號、股數、每股股利');return}
    if(currentId){const i=divs.findIndex(x=>x.id===currentId);divs[i]={...divs[i],...d};}
    else divs.push({id:uid(),...d});
    save(KEYS.divs,divs);
  } else if(currentModal==='add-realized'||currentModal==='edit-realized'){
    if(!d.code||!d.shares||!d.sellPrice||!d.buyPrice){alert('請填寫代號、股數、賣出/買入均價');return}
    const pnl=(d.sellPrice-d.buyPrice)*d.shares;
    const pnlPct=d.buyPrice>0?(d.sellPrice-d.buyPrice)/d.buyPrice*100:0;
    const item={id:uid(),...d,pnl,pnlPct};
    if(currentId){const i=realized.findIndex(x=>x.id===currentId);realized[i]={...realized[i],...item};}
    else realized.push(item);
    save(KEYS.realized,realized);
  } else if(currentModal==='edit-cash'){
    cash=d.cash||0;
    save(KEYS.cash,cash);
  }
  closeModal();
  renderAll();
}

function deleteItem(){
  if(!confirm('確定要刪除嗎？'))return;
  if(currentModal==='edit-stock'){stocks=stocks.filter(x=>x.id!==currentId);save(KEYS.stocks,stocks);}
  else if(currentModal==='edit-debt'){debts=debts.filter(x=>x.id!==currentId);save(KEYS.debts,debts);}
  else if(currentModal==='edit-div'){divs=divs.filter(x=>x.id!==currentId);save(KEYS.divs,divs);}
  else if(currentModal==='edit-realized'){realized=realized.filter(x=>x.id!==currentId);save(KEYS.realized,realized);}
  closeModal();
  renderAll();
}

function closeModal(){document.getElementById('overlay').classList.remove('open')}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeModal()}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ===================== INIT =====================
renderAll();
</script>
</body>
</html>
